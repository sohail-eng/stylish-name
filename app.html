<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sanam - Ultra Dense Heart</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #controls {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        button {
            padding: 12px 24px; background: #ff1493; color: white; border: none;
            border-radius: 25px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.4); transition: 0.3s;
        }
        button:hover { background: #ff69b4; transform: scale(1.05); }
        button:disabled { background: #444; box-shadow: none; }
        .info { color: rgba(255,255,255,0.6); font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>

<div id="controls">
    <div style="display: flex; gap: 8px; align-items: center;">
        <input type="text" id="nameInput" placeholder="Enter name" style="padding: 10px; border: none; border-radius: 5px; width: 150px; font-size: 14px;">
        <button id="goBtn" style="padding: 10px 20px; margin: 0;">Go</button>
    </div>
    <button id="recordBtn">Record 10s Clip</button>
    <span class="info">Particles: 100,000</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, mainGroup;
    let recorder, chunks = [];

    // --- Configuration ---
    const CONFIG = {
        outerCount: 70000,
        innerCount: 30000,
        textCount: 15000,
        heartColor: 0xff1493,
        innerColor: 0xff0000,
        textColor: 0x00ffff
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 40;

        renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // 1. Create Dense Outer Heart
        addHeart(CONFIG.outerCount, 1.0, CONFIG.heartColor, 3.5, 0.12);
        
        // 2. Create Dense Inner Heart
        addHeart(CONFIG.innerCount, 0.6, CONFIG.innerColor, 1.5, 0.08);

        // 3. Create Sharp Text "Sohail"
        addText();

        window.addEventListener('resize', onWindowResize);
        
        // Set input value from current URL param
        const params = new URLSearchParams(window.location.search);
        const currentName = params.get('name') || 'Sohail';
        document.getElementById('nameInput').value = currentName;
        
        document.getElementById('goBtn').onclick = () => {
            const name = document.getElementById('nameInput').value.trim();
            if (name) {
                window.location.search = '?name=' + encodeURIComponent(name);
            }
        };
        
        document.getElementById('nameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('goBtn').click();
            }
        });
        
        document.getElementById('recordBtn').onclick = startRecording;
        
        animate();
    }

    function addHeart(count, scale, color, zDepth, size) {
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(count * 3);
        
        for (let i = 0; i < count; i++) {
            const t = Math.random() * Math.PI * 2;
            // The Heart Parametric Formula
            const x = 16 * Math.pow(Math.sin(t), 3) * scale;
            const y = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
            
            const i3 = i * 3;
            pos[i3] = x + (Math.random() - 0.5) * 1.5; // Adding "noise" for volume
            pos[i3+1] = y + (Math.random() - 0.5) * 1.5;
            pos[i3+2] = (Math.random() - 0.5) * zDepth;
        }

        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({
            size: size,
            color: color,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        mainGroup.add(new THREE.Points(geo, mat));
    }

    function addText() {
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Sohail';
        
        const loader = new THREE.FontLoader();
        loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
            const shapes = font.generateShapes(name, 6);
            const textGeo = new THREE.Group();

            shapes.forEach(shape => {
                // High density outline points
                const points = shape.getSpacedPoints(1500); 
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const mat = new THREE.PointsMaterial({ size: 0.12, color: CONFIG.textColor, blending: THREE.AdditiveBlending });
                textGeo.add(new THREE.Points(geometry, mat));
                
                if (shape.holes) {
                    shape.holes.forEach(h => {
                        const hGeo = new THREE.BufferGeometry().setFromPoints(h.getSpacedPoints(500));
                        textGeo.add(new THREE.Points(hGeo, mat));
                    });
                }
            });

            // Center Text
            const box = new THREE.Box3().setFromObject(textGeo);
            const center = box.getCenter(new THREE.Vector3());
            textGeo.position.set(-center.x, -center.y, 0);
            mainGroup.add(textGeo);
        });
    }

    function startRecording() {
        const btn = document.getElementById('recordBtn');
        btn.disabled = true;
        btn.innerText = "Recording...";
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Sohail';
        
        chunks = [];
        const stream = renderer.domElement.captureStream(60);
        recorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${name}_Heart_100k.webm`;
            a.click();
            btn.disabled = false;
            btn.innerText = "Record 10s Clip";
        };

        recorder.start();
        setTimeout(() => recorder.stop(), 10000);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        mainGroup.rotation.y += 0.007;
        const pulse = 1 + Math.sin(Date.now() * 0.002) * 0.05;
        mainGroup.scale.set(pulse, pulse, pulse);
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
